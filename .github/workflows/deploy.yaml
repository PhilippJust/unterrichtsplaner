on: 
  push:
    branches:
      - main
name: Deploy
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v6
    - name: 🔧 Setup npm
      uses: actions/setup-node@v6
    - name: 🔧 Install Deps
      run: npm ci
    - name: 🔧 Setup Pages
      id: setup_pages
      uses: actions/configure-pages@v5
    - name: 👷 Build
      run: npm run build -w packages/core -w packages/userInterface/next-js
      env:
          PAGES_BASE_PATH: ${{ steps.setup_pages.outputs.base_path }}
    - name: 📦 Prepare artifact      
      uses: actions/upload-artifact@v6
      with:
        path: ./packages/userInterface/next-js/out
        name: next-js-app
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    needs: build
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: 🚀 Deploy to GitHub Page
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        artifact_name: next-js-app
